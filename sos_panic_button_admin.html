
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--surface-0,#0a0a0a);color:var(--text-primary,#fff);min-height:100vh;overflow-x:hidden}

/* TABS */
.tabs{display:flex;border-bottom:1px solid #222;background:#0d0d0d;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:14px 8px;font-size:13px;font-weight:600;letter-spacing:.04em;text-align:center;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:inherit}
.tab.active{color:#fff;border-bottom-color:#ff1a1a}
.tab .badge{display:inline-flex;align-items:center;justify-content:center;background:#ff1a1a;color:#fff;font-size:10px;font-weight:700;border-radius:999px;min-width:18px;height:18px;padding:0 5px;margin-left:6px;animation:pulse-badge 1.5s ease infinite}
@keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:.6}}

/* PAGE */
.page{display:none;padding:24px 20px;max-width:480px;margin:0 auto}
.page.active{display:block}

/* SOS PAGE */
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#555;text-align:center;margin-bottom:24px}
.btn-wrap{display:flex;align-items:center;justify-content:center;position:relative;height:200px;margin-bottom:28px}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(255,26,26,.3);animation:radar 2.4s ease-out infinite;opacity:0}
.ring:nth-child(1){width:160px;height:160px;animation-delay:0s}
.ring:nth-child(2){width:220px;height:220px;animation-delay:.7s}
.ring:nth-child(3){width:285px;height:285px;animation-delay:1.4s}
@keyframes radar{0%{opacity:0;transform:scale(.6)}20%{opacity:.8}100%{opacity:0;transform:scale(1.1)}}
#sos-btn{position:relative;z-index:2;width:150px;height:150px;border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 38% 35%,#ff4444,#c00000);box-shadow:0 0 0 6px rgba(255,26,26,.15),0 0 50px rgba(255,26,26,.35),0 8px 40px rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent;font-family:inherit}
#sos-btn:hover{transform:scale(1.05);box-shadow:0 0 0 6px rgba(255,26,26,.25),0 0 70px rgba(255,26,26,.55),0 8px 40px rgba(0,0,0,.6)}
#sos-btn:active{transform:scale(.93)}
#sos-btn.sending{animation:pulse-btn .45s ease infinite alternate}
@keyframes pulse-btn{to{transform:scale(1.04);box-shadow:0 0 0 10px rgba(255,26,26,.3),0 0 90px rgba(255,26,26,.65),0 8px 40px rgba(0,0,0,.6)}}
.btn-icon{font-size:44px;line-height:1}
.btn-label{font-size:16px;font-weight:900;letter-spacing:.06em;color:#fff}

/* LOC CARD */
.card{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:16px 18px;margin-bottom:16px}
.card-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#555;margin-bottom:12px}
.loc-row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:7px}
.loc-key{color:#666}
.loc-val{font-weight:600;color:#fff;font-variant-numeric:tabular-nums;text-align:right}
.loc-link{color:#ff4444;font-size:12px;font-weight:600;text-decoration:none}
.spinner-wrap{display:flex;align-items:center;gap:8px;font-size:13px;color:#666}
.spinner{width:14px;height:14px;border:2px solid #333;border-top-color:#ff1a1a;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.geo-error{font-size:13px;color:#ff6b6b;line-height:1.5}

/* SHARE */
.share-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.share-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:14px 8px;border-radius:12px;border:1px solid #1e1e1e;background:#111;cursor:pointer;font-size:11px;font-weight:600;color:#666;transition:border-color .15s,color .15s;font-family:inherit}
.share-btn:not(:disabled):hover{border-color:#444;color:#fff}
.share-btn .s-icon{font-size:20px}
.share-btn:disabled{opacity:.35;cursor:not-allowed}
.share-btn.wa:not(:disabled):hover{border-color:#25D366;color:#25D366}
.share-btn.sms:not(:disabled):hover{border-color:#5aabff;color:#5aabff}
.share-btn.mail:not(:disabled):hover{border-color:#ffa940;color:#ffa940}

/* STATUS PILL */
.status-pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#666;border:1px solid #1e1e1e;border-radius:999px;padding:5px 12px;margin-bottom:20px}
.sdot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0}
.sdot.ready{background:#00e676;box-shadow:0 0 6px #00e676}
.sdot.sending{background:#ff1a1a;box-shadow:0 0 6px #ff1a1a;animation:blink .5s ease infinite alternate}
.sdot.sent{background:#00e676;box-shadow:0 0 6px #00e676}
@keyframes blink{to{opacity:.2}}

/* SENT BANNER */
.sent-banner{display:flex;align-items:center;gap:10px;background:#0d1a0d;border:1px solid #1a4a1a;border-radius:12px;padding:14px 18px;font-size:14px;font-weight:600;color:#00e676;margin-bottom:16px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:20px;padding-bottom:env(safe-area-inset-bottom,20px)}
.modal-overlay.hidden{display:none}
.modal{background:#111;border:1px solid #2a2a2a;border-radius:20px 20px 16px 16px;padding:28px 24px;width:100%;max-width:440px;animation:slide-up .25s ease}
@keyframes slide-up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-size:20px;font-weight:900;text-align:center;margin-bottom:8px}
.modal p{font-size:14px;color:#888;text-align:center;margin-bottom:20px;line-height:1.5}
.modal-coords{font-size:12px;font-family:monospace;color:#00e676;background:#0a1a0a;border:1px solid #1a3a1a;border-radius:8px;padding:12px 14px;margin-bottom:20px;white-space:pre-wrap;line-height:1.7}
.modal-btn{width:100%;padding:15px;border-radius:12px;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:opacity .15s}
.modal-btn.primary{background:#ff1a1a;color:#fff}
.modal-btn.secondary{background:#1e1e1e;color:#999;font-size:13px}

/* ADMIN PAGE */
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.admin-title{font-size:18px;font-weight:700}
.admin-actions{display:flex;gap:8px}
.clear-btn{background:#1e1e1e;border:1px solid #2a2a2a;color:#888;font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:inherit;transition:color .15s,border-color .15s}
.clear-btn:hover{color:#ff4444;border-color:#ff4444}
.refresh-btn{background:#1e1e1e;border:1px solid #2a2a2a;color:#888;font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:inherit;transition:color .15s}
.refresh-btn:hover{color:#fff}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:14px 16px}
.stat-num{font-size:24px;font-weight:900;margin-bottom:2px}
.stat-num.red{color:#ff4444}
.stat-num.amber{color:#ffaa00}
.stat-num.green{color:#00e676}
.stat-label{font-size:11px;color:#555;font-weight:600;letter-spacing:.08em;text-transform:uppercase}

/* ALERT LIST */
.alert-list{display:flex;flex-direction:column;gap:10px}
.alert-item{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:16px 18px;border-left:3px solid #ff1a1a;position:relative}
.alert-item.resolved{border-left-color:#444;opacity:.6}
.alert-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.alert-who{font-size:14px;font-weight:700}
.alert-time{font-size:11px;color:#555;flex-shrink:0}
.alert-coords{font-size:12px;font-family:monospace;color:#00e676;margin-bottom:8px}
.alert-acc{font-size:11px;color:#666;margin-bottom:10px}
.alert-btns{display:flex;gap:8px;flex-wrap:wrap}
.map-btn{background:rgba(255,26,26,.1);border:1px solid rgba(255,26,26,.3);color:#ff4444;font-size:11px;font-weight:600;padding:6px 10px;border-radius:7px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
.resolve-btn{background:#1e1e1e;border:1px solid #2a2a2a;color:#888;font-size:11px;font-weight:600;padding:6px 10px;border-radius:7px;cursor:pointer;font-family:inherit;transition:color .15s}
.resolve-btn:hover{color:#00e676}
.share-alert-btn{background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.25);color:#25D366;font-size:11px;font-weight:600;padding:6px 10px;border-radius:7px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
.empty-admin{text-align:center;padding:60px 20px;color:#444;font-size:14px}
.empty-icon{font-size:48px;margin-bottom:12px}
.new-badge{background:#ff1a1a;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="switchTab('sos',this)">🆘 SOS</button>
  <button class="tab" onclick="switchTab('admin',this)" id="admin-tab">
    🛡️ Admin
    <span class="badge" id="admin-badge" style="display:none">0</span>
  </button>
</div>

<!-- SOS PAGE -->
<div class="page active" id="page-sos">
  <div style="text-align:center;padding-top:16px">
    <div class="status-pill">
      <span class="sdot" id="sdot"></span>
      <span id="stext">Detectando GPS…</span>
    </div>
  </div>

  <p class="eyebrow">Sistema de alerta de emergencia</p>

  <div class="btn-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <button id="sos-btn" onclick="handlePanic()">
      <span class="btn-icon">🆘</span>
      <span class="btn-label">SOS</span>
    </button>
  </div>

  <div id="sent-banner-wrap"></div>

  <div class="card">
    <div class="card-title">📍 Tu ubicación</div>
    <div id="loc-display">
      <div class="spinner-wrap"><span class="spinner"></span> Detectando GPS…</div>
    </div>
  </div>

  <div class="share-row">
    <button class="share-btn wa"   id="btn-wa"   disabled onclick="shareWA()"><span class="s-icon">💬</span>WhatsApp</button>
    <button class="share-btn sms"  id="btn-sms"  disabled onclick="shareSMS()"><span class="s-icon">📱</span>SMS</button>
    <button class="share-btn mail" id="btn-mail" disabled onclick="shareMail()"><span class="s-icon">📧</span>Email</button>
  </div>
</div>

<!-- ADMIN PAGE -->
<div class="page" id="page-admin">
  <div class="admin-header">
    <span class="admin-title">Panel de control</span>
    <div class="admin-actions">
      <button class="refresh-btn" onclick="renderAdmin()">↻ Actualizar</button>
      <button class="clear-btn" onclick="clearAll()">Limpiar todo</button>
    </div>
  </div>

  <div class="stat-row" id="stat-row">
    <div class="stat-card"><div class="stat-num red" id="s-total">0</div><div class="stat-label">Total alertas</div></div>
    <div class="stat-card"><div class="stat-num amber" id="s-active">0</div><div class="stat-label">Activas</div></div>
    <div class="stat-card"><div class="stat-num green" id="s-resolved">0</div><div class="stat-label">Resueltas</div></div>
  </div>

  <div id="alert-list"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>🚨 Enviar alerta SOS</h2>
    <p>Tu ubicación exacta será compartida. Úsalo solo en emergencias reales.</p>
    <div class="modal-coords" id="modal-coords">—</div>
    <button class="modal-btn primary" onclick="confirmSend()">Confirmar — estoy en peligro</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
/* ── STATE ── */
let coords = null;
let mapsUrl = '';
let sentBannerShown = false;

const STORAGE_KEY = 'sos_alerts';

function loadAlerts(){
  try{
    const r = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
    return Array.isArray(r)?r:[];
  }catch{return[]}
}
function saveAlerts(arr){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(arr))}catch{}
}

/* ── GEOLOCATION ── */
function initGeo(){
  if(!navigator.geolocation){
    setStatus('','Sin GPS');
    document.getElementById('loc-display').innerHTML=`<div class="geo-error">El navegador no soporta geolocalización.</div>`;
    return;
  }
  navigator.geolocation.watchPosition(onPos, onErr, {enableHighAccuracy:true,maximumAge:8000,timeout:12000});
}

function onPos(p){
  coords=p.coords;
  const lat=coords.latitude.toFixed(6),lon=coords.longitude.toFixed(6),acc=Math.round(coords.accuracy);
  mapsUrl=`https://www.google.com/maps?q=${lat},${lon}`;
  document.getElementById('loc-display').innerHTML=`
    <div class="loc-row"><span class="loc-key">Latitud</span><span class="loc-val">${lat}</span></div>
    <div class="loc-row"><span class="loc-key">Longitud</span><span class="loc-val">${lon}</span></div>
    <div class="loc-row"><span class="loc-key">Precisión</span><span class="loc-val">±${acc} m</span></div>
    <div class="loc-row"><span class="loc-key">Google Maps</span><a href="${mapsUrl}" target="_blank" class="loc-link">Ver mapa ↗</a></div>`;
  setStatus('ready','Ubicación lista');
  enableShare(true);
}

function onErr(e){
  const m={1:'Permiso denegado.',2:'GPS no disponible.',3:'Tiempo agotado.'};
  setStatus('','Sin GPS');
  document.getElementById('loc-display').innerHTML=`<div class="geo-error">${m[e.code]||'Error GPS.'} Activa el permiso de ubicación y recarga.</div>`;
}

/* ── PANIC FLOW ── */
function handlePanic(){
  if(!coords){alert('Ubicación no detectada. Activa el permiso GPS y espera unos segundos.');return}
  const lat=coords.latitude.toFixed(6),lon=coords.longitude.toFixed(6),acc=Math.round(coords.accuracy);
  document.getElementById('modal-coords').textContent=`Lat: ${lat}\nLon: ${lon}\nPrecisión: ±${acc} m\n\n${mapsUrl}`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal(){document.getElementById('modal-overlay').classList.add('hidden')}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal()}

function confirmSend(){
  closeModal();
  const btn=document.getElementById('sos-btn');
  btn.classList.add('sending');
  setStatus('sending','Enviando alerta…');

  setTimeout(()=>{
    btn.classList.remove('sending');
    setStatus('sent','Alerta enviada');

    const alert={
      id: Date.now(),
      lat: coords.latitude.toFixed(6),
      lon: coords.longitude.toFixed(6),
      acc: Math.round(coords.accuracy),
      mapsUrl,
      timestamp: new Date().toISOString(),
      resolved: false
    };
    const alerts=loadAlerts();
    alerts.unshift(alert);
    saveAlerts(alerts);
    updateBadge();

    if(!sentBannerShown){
      sentBannerShown=true;
      document.getElementById('sent-banner-wrap').innerHTML=`<div class="sent-banner">✅ Alerta enviada — usa los botones para compartir</div>`;
    }

    if(navigator.share){
      navigator.share({title:'🚨 EMERGENCIA',text:`Necesito ayuda urgente.\nUbicación: ${alert.lat}, ${alert.lon}`,url:mapsUrl}).catch(()=>{});
    }
  },1200);
}

/* ── SHARE ── */
function buildMsg(){
  if(!coords)return'';
  return `🚨 EMERGENCIA — Necesito ayuda urgente!\nUbicación: ${coords.latitude.toFixed(6)}, ${coords.longitude.toFixed(6)}\n📍 ${mapsUrl}`;
}
function shareWA(){window.open(`https://wa.me/?text=${encodeURIComponent(buildMsg())}`, '_blank')}
function shareSMS(){window.open(`sms:?body=${encodeURIComponent(buildMsg())}`, '_blank')}
function shareMail(){window.open(`mailto:?subject=${encodeURIComponent('🚨 EMERGENCIA')}&body=${encodeURIComponent(buildMsg())}`, '_blank')}

/* ── ADMIN ── */
function renderAdmin(){
  const alerts=loadAlerts();
  const active=alerts.filter(a=>!a.resolved).length;
  const resolved=alerts.filter(a=>a.resolved).length;

  document.getElementById('s-total').textContent=alerts.length;
  document.getElementById('s-active').textContent=active;
  document.getElementById('s-resolved').textContent=resolved;

  const list=document.getElementById('alert-list');
  if(alerts.length===0){
    list.innerHTML=`<div class="empty-admin"><div class="empty-icon">📭</div><div>No hay alertas registradas</div></div>`;
    return;
  }

  list.innerHTML=alerts.map(a=>{
    const d=new Date(a.timestamp);
    const dateStr=d.toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
    const timeStr=d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const isNew=(Date.now()-d.getTime())<300000;
    return`<div class="alert-item ${a.resolved?'resolved':''}" id="alert-${a.id}">
      <div class="alert-top">
        <span class="alert-who">Alerta SOS${isNew&&!a.resolved?'<span class="new-badge">NUEVA</span>':''}</span>
        <span class="alert-time">${dateStr} ${timeStr}</span>
      </div>
      <div class="alert-coords">${a.lat}, ${a.lon}</div>
      <div class="alert-acc">Precisión: ±${a.acc} m</div>
      <div class="alert-btns">
        <a href="${a.mapsUrl}" target="_blank" class="map-btn">📍 Ver en mapa</a>
        <a href="https://wa.me/?text=${encodeURIComponent('🚨 EMERGENCIA registrada:\nUbicación: '+a.lat+', '+a.lon+'\n'+a.mapsUrl)}" target="_blank" class="share-alert-btn">💬 WhatsApp</a>
        ${!a.resolved?`<button class="resolve-btn" onclick="resolveAlert(${a.id})">✓ Resolver</button>`:`<span style="font-size:11px;color:#555">Resuelta</span>`}
      </div>
    </div>`}).join('');
}

function resolveAlert(id){
  const alerts=loadAlerts();
  const idx=alerts.findIndex(a=>a.id===id);
  if(idx>-1){alerts[idx].resolved=true;saveAlerts(alerts);renderAdmin();updateBadge()}
}

function clearAll(){
  if(confirm('¿Borrar todas las alertas?')){saveAlerts([]);renderAdmin();updateBadge()}
}

function updateBadge(){
  const alerts=loadAlerts();
  const active=alerts.filter(a=>!a.resolved).length;
  const badge=document.getElementById('admin-badge');
  if(active>0){badge.style.display='inline-flex';badge.textContent=active}
  else{badge.style.display='none'}
}

/* ── TABS ── */
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='admin')renderAdmin();
}

/* ── HELPERS ── */
function setStatus(cls,txt){
  const d=document.getElementById('sdot');
  d.className='sdot '+(cls||'');
  document.getElementById('stext').textContent=txt;
}
function enableShare(on){
  ['btn-wa','btn-sms','btn-mail'].forEach(id=>document.getElementById(id).disabled=!on);
}

/* ── INIT ── */
initGeo();
updateBadge();
</script>
</body>
</html>
